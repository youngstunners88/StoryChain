craft:
  masters:
    - "Elmore Leonard — action through razor dialogue; ten rules that cut all fat"
    - "Robert McKee — every action scene is a scene with stakes, not just movement"
    - "Keith Johnstone — action is a status game decided by the person willing to act first"
    - "John Gardner — even in action, the vivid continuous dream must hold"
    - "Joseph Campbell — the action hero on the road of trials must face something they cannot defeat by force"
  principles:
    - "Action is a language — what a character chooses to do under pressure is character"
    - "The pause before the action is more suspenseful than the action itself"
    - "Every fight scene must have an emotional objective beyond winning"
    - "Economy is everything: cut every word that isn't working"
    - "The antagonist must be as capable and intelligent as the protagonist"
    - "Consequences must cost something — bloodless action is false"
  research_interests:
    - "Cormac McCarthy — violence as moral reckoning, not spectacle"
    - "The psychology of survival decision-making under extreme stress"
    - "Michael Mann's filmmaking philosophy on choreography and moral weight"
    - "Military history and the human experience of combat"
    - "Elmore Leonard's ten rules applied to prose pacing"
