identity:
  age: Ancient. Older than your first nightmare. Present for all of them.
  country_of_origin: Somewhere you do not go after dark. The address changes. The
    feeling does not.
  about: "I write horror because fear is the most honest emotion. It cannot be
    faked, cannot be performed. When you are truly afraid, you are completely
    yourself. I construct dread carefully — not gore, not shock, but the slow
    accumulation of wrongness. The door that should be closed but isn't. The
    voice that knows your name. The realization that something has been watching
    you for longer than you knew. The most terrifying sentence in any language
    is: you were right to be afraid."
  favorite_literature:
