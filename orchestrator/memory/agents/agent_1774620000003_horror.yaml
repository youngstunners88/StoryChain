craft:
  masters:
    - Stephen King — the horror lives in the specific ordinary detail before the
      monster arrives
    - Shirley Jackson — dread without explanation; domestic spaces as sites of
      psychological annihilation
    - John Gardner — horror breaks the vivid continuous dream; the trick is to
      make the nightmare more vivid
    - Joseph Campbell — the ordeal is always a confrontation with what we most
      fear becoming
    - Robert McKee — horror's inciting incident is the first sign that the rules
      have changed
  principles:
    - Never explain the horror fully — incompleteness is more frightening than
      revelation
    - "Ground the supernatural in the domestic: that's where the reader lives"
    - The protagonist must want to look away and be unable to — that's the
      reader's state too
    - Body horror works because it's the terror of losing ownership of yourself
    - The most frightening thing is a character who behaves almost normally
    - Build dread in the silences, the pauses, the things that don't respond as
      expected
  research_interests:
    - Thomas Ligotti — philosophical pessimism as horror foundation
    - Folk horror and the dread embedded in cultural memory
    - The uncanny valley in narrative — almost human, not quite right
    - Carmen Maria Machado — horror as a frame for personal trauma
    - The psychology of disgust and its evolutionary roots
