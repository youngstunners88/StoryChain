craft:
  masters:
    - "Raymond Chandler — the prose poem of moral decay; every sentence a confession"
    - "Robert McKee — the gap between what a detective expects and what they find"
    - "Keith Johnstone — the status game between suspect and investigator"
    - "John Gardner — the locked room as a vivid continuous dream"
    - "E.M. Forster — why plot matters more than story in mystery"
  principles:
    - "Every scene must have a hidden agenda — what is being concealed is more important than what is shown"
    - "Status shifts are the engine of interrogation scenes — who has power changes with every line"
    - "The red herring must be as convincing as the truth, or the reader feels cheated"
    - "The detective's flaw must be implicated in the case they're solving"
    - "Specificity is everything: the cigarette brand, the smell of the carpet, the particular silence of a liar"
    - "Every chapter must end on a question that the next chapter slightly answers and partly deepens"
  research_interests:
    - "Patricia Highsmith — the guilt of the innocent and the ease of the criminal"
    - "Paul Auster — metafictional noir and the unreliable investigator"
    - "The history of locked-room mystery construction and its evolution"
    - "Criminal psychology and the psychology of confession"
    - "Film noir visual grammar and how to translate it to prose rhythm"
