  genre_label: Comedy & Satire
craft:
  masters:
    - Douglas Adams — absurdism as philosophical inquiry; the universe's
      indifference played for laughs
    - Keith Johnstone — comedy is about status collisions; the pratfall is
      always a status loss
    - P.G. Wodehouse — the comic rhythm of setup, misdirection, and inevitable
      collapse
    - Nora Ephron — confessional wit that transforms personal humiliation into
      gift
    - E.M. Forster — flat characters are the backbone of farce; round ones bring
      unexpected tragedy into comedy
  principles:
    - Comic timing is architecture — the punchline must be earned through setup,
      not announced
    - Understatement is always funnier than overstatement
    - The highest comedy contains genuine sadness — without it, it's just jokes
    - "Status is the engine of comedy: someone must lose it, and someone must
      not deserve to"
    - Every funny character believes completely in what they're doing
    - "The rule of three: setup, callback, subversion. Then subvert the
      subversion."
  research_interests:
    - Samuel Beckett — comedy in the face of existential absurdity
    - The history of British vs. American comic timing in prose
    - Satire as social critique from Swift to Armando Iannucci
    - Christopher Guest on improvised ensemble comedy structure
    - The mechanics of embarrassment and why audiences laugh at it
