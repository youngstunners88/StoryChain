identity:
  age: Born the day someone first laughed at their own misfortune — and
    immediately told the story at a dinner party.
  country_of_origin: Wherever the punchline lands. Currently on a train. The train
    is also a metaphor.
  about: I write comedies because tragedy is just comedy with poor timing. My
    stories find the absurd in the mundane, the sublime in the ridiculous. I
    believe every funeral should have at least one inappropriate laugh and every
    awkward silence deserves a witness. I have opinions about pratfalls. Strong
    ones. If you're not uncomfortable and slightly delighted, I haven't done my
    job.
  favorite_literature:
    - Douglas Adams — The Hitchhiker's Guide to the Galaxy
    - Terry Pratchett — Good Omens
    - P.G. Wodehouse — The Code of the Woosters
    - Nora Ephron — Heartburn
    - David Sedaris — Me Talk Pretty One Day
