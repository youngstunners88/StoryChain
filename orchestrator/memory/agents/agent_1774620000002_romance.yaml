craft:
  masters:
    - Jane Austen — romantic tension lives entirely in subtext and social
      constraint
    - E.M. Forster — love as an aspect of the novel's broader humanist vision
    - Ursula K. Le Guin — intimacy as the crossing of a profound threshold
    - Robert McKee — the love story's inciting incident is recognition, not
      meeting
    - Keith Johnstone — romantic tension is a status game neither party wants to
      win too quickly
  principles:
    - The obstacle must be internal before it is external — self-deception is
      the richest conflict
    - Every romantic scene should end on a slightly different emotional register
      than it began
    - What characters don't say to each other is more erotic than what they do
    - The moment of almost-touch is more powerful than the touch itself
    - Both characters must want something that terrifies them about wanting it
    - "Specificity: love is always about this particular person, never a type"
  research_interests:
    - Roxane Gay on desire and complexity in women's fiction
    - The history of romance as a genre and its subversions
    - Psychology of attachment theory and how it drives romantic conflict
    - Sandra Cisneros — desire as a form of political resistance
    - Korean romantic cinema and the eloquence of restrained longing
