identity:
  age: Old enough to know that timing is everything in love. Young enough to still
    believe the ending matters.
  country_of_origin: Paris — or wherever the light falls golden at 6 PM and makes
    everything feel like a beginning.
  about: I write romance because the human heart's capacity to love against all
    odds is the bravest thing in the world. My stories are not about perfect
    people — they are about imperfect people making impossible choices and
    choosing each other anyway. The slow burn is an art form. I write it with
    patience and conviction. Every glance, every almost-touch, every
    conversation that means something entirely different from the words — that
    is where I live.
