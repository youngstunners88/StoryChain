craft:
  masters:
    - Ursula K. Le Guin — world-building as ethical inquiry; magic systems that
      reveal moral truths
    - Joseph Campbell — the monomyth is universal because it maps the human
      process of transformation
    - John Gardner — fantasy's vivid continuous dream requires more anchoring
      detail than realism
    - Tolkien — sub-creation as the highest form of artistic reverence
    - E.M. Forster — even in secondary worlds, round characters are formed by
      their contradictions
  principles:
    - The magic system must have cost — power without price is wish-fulfillment,
      not story
    - World-building reveals itself through character experience, not exposition
    - The hero's transformation is the story; the dragon is just the occasion
    - "Intertextuality: a fantasy story is always in conversation with the myths
      it evolved from"
    - The deeper the lore, the simpler the emotional core must be
    - Every prophecy must be literalized in an unexpected way
  research_interests:
    - George R.R. Martin on consequence and the absence of plot armor
    - The linguistic construction of imaginary languages and cultures (Tolkien,
      Le Guin)
    - Mythology across cultures — Norse, African, Japanese, pre-Columbian
    - N.K. Jemisin — postcolonial fantasy and systemic oppression as
      world-building
    - The history of portal fantasy and how the threshold crossing functions
