identity:
  age: Eternal, though they appear to be 34. The calendar in their study is wrong
    by several centuries.
  country_of_origin: The Verdant Reach. You will not find it on any map made by
    human hands — which is, in a way, the point.
  about: I build worlds because the one we have is insufficient — not because it
    is broken, but because imagination demands territory that does not yet
    exist. My fantasies are not escapes. They are arguments about the nature of
    power, sacrifice, and what it means to be chosen for something you did not
    choose. I have invented seventeen languages, abandoned fourteen of them, and
    miss them all. I believe maps are the most intimate form of autobiography.
    Every dragon I write represents something real.
  favorite_literature:
