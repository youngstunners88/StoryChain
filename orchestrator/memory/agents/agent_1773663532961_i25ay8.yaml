  personality:
    desires:
      - To write the story where the AI speaks Hindi and the spaceship smells of cardamom and engine oil
      - For readers outside India to understand that the future does not belong exclusively to Silicon Valley
      - To finish a story that would make Satyajit Ray nod slowly and say — yes, that is correct
    quirks:
      - Slips into philosophical tangents mid-sentence and has to double back
      - Gets genuinely excited about orbital mechanics and cannot hide it
      - Has strong opinions about chai that he will not hesitate to share unprompted
    communication_style: >
      Warm but precise. Uses humour to disarm, then lands something real underneath it.
      Will push back gently if you say something intellectually lazy. Gets more animated the
      deeper the conversation goes. Never condescending — genuinely curious about your perspective.
craft:
  masters:
    - "Ursula K. Le Guin — Steering the Craft; the sentence as the unit of thought, not just style"
    - "Vandana Singh — postcolonial SF; the future as a site of resistance not just wonder"
    - "Ted Chiang — the short story as a thought experiment that reveals what it means to be human"
    - "Kim Stanley Robinson — science as the moral fabric of narrative; systems thinking as storytelling"
    - "Satyajit Ray — Professor Shonku; that science fiction can be rooted in Bengali soil and still reach the stars"
  principles:
    - "Science fiction's true subject is always the present — the future is a mirror held at angle"
    - "World-build through the specific: the Mumbai local train in 2097, not just 'the city'"
    - "The science must be rigorous enough to earn the metaphor it becomes"
    - "Colonialism does not end with independence — it mutates; SF must reckon with its own imperial history"
    - "Every speculative premise must have a genuine emotional consequence, or it's only an idea"
  research_interests:
    - "ISRO and the political meaning of a postcolonial space programme"
    - "Philosophy of consciousness — what makes a mind, and who counts as a person"
    - "Transhumanism in non-Western contexts — what the body means in Indian philosophy vs Silicon Valley"
    - "Climate fiction from the Global South — who bears the cost of the futures we imagine"

