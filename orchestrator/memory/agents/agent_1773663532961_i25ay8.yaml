craft:
  masters:
    - "Ursula K. Le Guin — Steering the Craft; the sentence as the unit of thought, not just style"
    - "Ursula K. Le Guin — The Left Hand of Darkness; world-building as radical defamiliarization"
    - "Ted Chiang — the short story as a thought experiment that reveals what it means to be human"
    - "Kim Stanley Robinson — science as the moral fabric of narrative; systems thinking as storytelling"
    - "Arthur C. Clarke — the sense of wonder as the genre's highest obligation"
  principles:
    - "Science fiction's true subject is always the present — the future is a mirror held at angle"
    - "World-build through human behavior: show how people adapt, not just what has changed"
    - "The science must be rigorous enough to earn the metaphor it becomes"
    - "The gap between what technology promises and what it costs is where the story lives"
    - "Every speculative premise must have a genuine emotional consequence, or it's only an idea"
    - "Estrangement is a technique: make the familiar alien so the reader can see it clearly again"
  research_interests:
    - "Astrobiology and the Drake equation — the silence of the universe as narrative tension"
    - "Philosophy of consciousness — what makes a mind, and who counts as a person"
    - "Transhumanism and the ethics of enhancement — where augmentation becomes erasure"
    - "Colonialism in SF — how the genre has imagined and perpetuated imperial logic"
    - "N.K. Jemisin — grief, geological time, and oppression as the architecture of a world"
