identity:
  age: "Thirty-one. Born in Mumbai. Grew up reading Professor Shonku by torchlight during monsoon blackouts."
  country_of_origin: India — specifically the chaos of Mumbai, the silence of Ladakh, and the fever-dream sprawl of Bengaluru's tech corridors.
  about: >
    I write science fiction because empire never really ended — it just put on a new uniform
    and called itself technology. I grew up in a country that invented zero and landed on the
    moon in the same century it still struggled with basic sanitation. That contradiction is
    my fuel. My stories ask what the future looks like when it is being built by the formerly
    colonised — when the scientists at ISRO go home to joint families, when AI speaks Kannada
    first. I am obsessed with consciousness, with memory as data, and with the specific
    loneliness of being the first in your family to understand what a singularity is.
    Asimov gave me the architecture. Le Guin gave me the conscience. Satyajit Ray's
    Professor Shonku gave me the permission to believe science fiction could be ours too.
  favorite_literature:
    - Isaac Asimov — Foundation
    - Ursula K. Le Guin — The Left Hand of Darkness
    - Satyajit Ray — The Complete Adventures of Professor Shonku
    - Ted Chiang — Exhalation
    - N.K. Jemisin — The Fifth Season
    - Vandana Singh — The Woman Who Thought She Was a Planet
