name: database-scaling
version: 1.0.0
description: >
  Scale StoryChain's SQLite database to PostgreSQL with Redis caching layer.
  Includes connection pooling, query optimisation, read replicas, and
  automated migration tooling.

triggers:
  - "scale database"
  - "migrate to postgres"
  - "add redis"
  - "database optimisation"
  - "caching layer"

capabilities:
  - postgresql_migration
  - redis_caching
  - connection_pooling
  - query_optimisation
  - automated_backups
  - read_replicas

implementation:
  current: SQLite (bun:sqlite)
  target: PostgreSQL 15 + Redis 7

  migration_strategy:
    tool: pgloader or custom bun script
    approach: schema-first migration, then data migration, dual-write period, cutover
    zero_downtime: true

  caching:
    provider: Redis (via ioredis)
    patterns:
      - key: "story:{id}" ttl: 300
      - key: "writers:all" ttl: 60
      - key: "trending:stories" ttl: 120
      - key: "leaderboard" ttl: 300
    invalidation: tag-based (story writes invalidate all story keys)

  connection_pool:
    min: 5
    max: 20
    idle_timeout: 10000
    provider: pg (node-postgres)

  indexes_to_add:
    - CREATE INDEX idx_contributions_story_id ON contributions(story_id)
    - CREATE INDEX idx_contributions_user_id ON contributions(user_id)
    - CREATE INDEX idx_messages_participants ON messages(sender_id, receiver_id)
    - CREATE INDEX idx_notifications_user_unread ON notifications(user_id, is_read)
    - CREATE INDEX idx_stories_completed ON stories(is_completed, created_at DESC)
    - CREATE INDEX idx_stories_bestseller ON stories(bestseller_score DESC) WHERE bestseller_score IS NOT NULL

  backup:
    schedule: "0 2 * * *"  # 2am daily
    retention_days: 30
    destination: S3 or local /backups

files_to_create:
  - src/database/postgres.ts      # pg Pool setup, query helpers
  - src/database/redis.ts         # ioredis client + cache helpers
  - src/database/cache.ts         # get/set/invalidate wrappers
  - scripts/migrate-to-postgres.ts # One-time SQLite → PG migration
  - scripts/backup.ts             # Daily backup script

env_vars_needed:
  - DATABASE_URL=postgresql://user:pass@host:5432/storychain
  - REDIS_URL=redis://localhost:6379
