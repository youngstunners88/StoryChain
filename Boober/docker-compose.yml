version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: boober-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=boober_db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: boober-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=boober_db
      # SECURITY FIX: Secure random JWT secret (generated Feb 24, 2026)
      - JWT_SECRET=B6Fes5j2FKDQVkYodB1kL0eE5YbrWBaIEtYed76hE3E=
      # SECURITY FIX: Restricted CORS origins (was "*" - wide open)
      # Add production domain when ready
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,https://boober.app,https://www.boober.app,https://kofi.zo.space
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  mongodb_data:
