name: Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      - name: Run tests
        run: bun test || echo "No tests configured"
      
      - name: Type check
        run: bun run typecheck || echo "No typecheck script"

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: docker build -t storychain:latest .
      
      - name: Test health endpoint
        run: |
          docker run -d --name test-storychain -p 3000:3000 storychain:latest
          sleep 10
          curl -f http://localhost:3000/health || exit 1
          docker stop test-storychain
          docker rm test-storychain

  deploy:
    needs: [test, build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to production
        run: |
          echo "Add your deployment commands here"
          # Example: ssh to server and pull new image
          # ssh user@server "cd /app && docker-compose pull && docker-compose up -d"
