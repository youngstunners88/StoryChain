<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StoryChain - Collaborative Storytelling</title>
  <meta name="description" content="Multi-LLM collaborative storytelling platform. Create, share, and contribute to stories with AI assistance.">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23f59e0b'><path d='M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253' /></svg>">
  
  <!-- Tailwind CDN (for development) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* Critical CSS */
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #09090b;
      color: #fafafa;
    }
    
    #root {
      min-height: 100vh;
    }
    
    /* Loading spinner */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #27272a;
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading">
      <div class="spinner"></div>
    </div>
  </div>
  
  <script type="text/babel" data-type="module">
    // StoryChain React App
    const { useState, useEffect, useCallback } = React;
    
    // ==================== TYPES ====================
    
    const LLM_MODELS = [
      { id: 'kimi-k2.5', name: 'Kimi K2.5', provider: 'zo', description: 'Advanced reasoning model', isFree: true },
      { id: 'reka-edge', name: 'Reka Edge', provider: 'openrouter', description: 'Fast creative writing', isFree: false, costPer1KTokens: 0.0005 },
      { id: 'qwen-2.5', name: 'Qwen 2.5', provider: 'openrouter', description: 'Multilingual support', isFree: false, costPer1KTokens: 0.0003 },
      { id: 'mercury-2', name: 'Mercury 2', provider: 'inception', description: 'Narrative specialist', isFree: false, costPer1KTokens: 0.001 },
      { id: 'llama-3.1', name: 'Llama 3.1', provider: 'groq', description: 'Fast & free', isFree: true },
      { id: 'gemma-2', name: 'Gemma 2', provider: 'groq', description: 'Lightweight', isFree: true },
      { id: 'mixtral-8x7b', name: 'Mixtral 8x7B', provider: 'groq', description: 'MoE model', isFree: true },
      { id: 'gemini-pro', name: 'Gemini Pro', provider: 'google', description: 'Multimodal', isFree: true },
    ];
    
    const DEFAULT_CHARACTER_EXTENSION = {
      baseCharacters: 300,
      maxExtensions: 5,
      extensionSize: 100,
      tokensPerExtension: 5,
      maxTotalCharacters: 800,
    };
    
    // ==================== UTILS ====================
    
    // Token management
    const TOKEN_KEY = 'storychain_auth_token';

    function getToken() {
      return localStorage.getItem(TOKEN_KEY);
    }

    function setToken(token) {
      localStorage.setItem(TOKEN_KEY, token);
    }

    function fetchWithAuth(url, options = {}) {
      const token = getToken();
      const headers = {
        'Content-Type': 'application/json',
        ...options.headers,
      };
      if (token) {
        headers['Authorization'] = `Bearer ${token}`;
      }
      return fetch(url, {
        ...options,
        headers,
      });
    }

    function getRoute() {
      const hash = window.location.hash.slice(1);
      return hash.split('/')[0] || 'feed';
    }
    
    function getRouteParam() {
      const hash = window.location.hash.slice(1);
      const parts = hash.split('/');
      return parts.length >= 2 ? parts[1] : null;
    }
    
    function formatDate(date) {
      const d = new Date(date);
      const now = new Date();
      const diff = now.getTime() - d.getTime();
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(hours / 24);
      
      if (hours < 1) return 'Just now';
      if (hours < 24) return `${hours}h ago`;
      if (days < 7) return `${days}d ago`;
      return d.toLocaleDateString();
    }
    
    function getModelColor(model) {
      const colors = {
        'kimi-k2.5': 'bg-purple-500/20 text-purple-400',
        'reka-edge': 'bg-blue-500/20 text-blue-400',
        'qwen-2.5': 'bg-cyan-500/20 text-cyan-400',
        'mercury-2': 'bg-amber-500/20 text-amber-400',
        'llama-3.1': 'bg-green-500/20 text-green-400',
        'gemma-2': 'bg-pink-500/20 text-pink-400',
        'mixtral-8x7b': 'bg-orange-500/20 text-orange-400',
        'gemini-pro': 'bg-indigo-500/20 text-indigo-400',
      };
      return colors[model] || 'bg-zinc-500/20 text-zinc-400';
    }
    
    // ==================== COMPONENTS ====================
    
    // Model Selector Component
    function ModelSelector({ selectedModel, onModelChange, disabled = false }) {
      const [apiKeyStatus, setApiKeyStatus] = useState([]);
      const [loading, setLoading] = useState(true);
      
      useEffect(() => {
        fetchApiKeyStatus();
      }, []);
      
      const fetchApiKeyStatus = async () => {
        try {
          const response = await fetch('/api/llm/models');
          const data = await response.json();
          setApiKeyStatus(data.models.map(m => ({ key: m.id, valid: m.available, models: [m.id] })));
        } catch (error) {
          console.error('Failed to fetch API key status:', error);
        } finally {
          setLoading(false);
        }
      };
      
      const isModelAvailable = (model) => {
        const status = apiKeyStatus.find(k => k.models.includes(model.id));
        return model.provider === 'zo' || (status?.valid ?? false);
      };
      
      const getModelStatus = (model) => {
        if (model.id === selectedModel) return 'selected';
        if (isModelAvailable(model)) return 'available';
        return 'unavailable';
      };
      
      if (loading) {
        return (
          <div className="animate-pulse space-y-2">
            {[1,2,3].map(i => <div key={i} className="h-10 bg-zinc-800 rounded-lg"></div>)}
          </div>
        );
      }
      
      return (
        <div className="space-y-3">
          <div className="flex items-center justify-between">
            <label className="text-sm font-medium text-zinc-300">AI Model</label>
            <span className="text-xs text-zinc-500">
              {LLM_MODELS.find(m => m.id === selectedModel)?.name}
            </span>
          </div>
          
          <div className="grid grid-cols-1 gap-2">
            {LLM_MODELS.map((model) => {
              const status = getModelStatus(model);
              return (
                <button
                  key={model.id}
                  onClick={() => status !== 'unavailable' && onModelChange(model.id)}
                  disabled={disabled || status === 'unavailable'}
                  className={`
                    relative flex items-center gap-3 p-3 rounded-lg border-2 transition-all duration-200 text-left
                    ${status === 'selected'
                      ? 'border-amber-500 bg-amber-500/10'
                      : status === 'available'
                        ? 'border-zinc-700 hover:border-zinc-500 bg-zinc-800/50 hover:bg-zinc-800'
                        : 'border-zinc-800 bg-zinc-900/50 cursor-not-allowed opacity-60'
                    }
                  `}
                >
                  <div className={`
                    w-5 h-5 rounded-full border-2 flex items-center justify-center
                    ${status === 'selected' ? 'border-amber-500 bg-amber-500' : 'border-zinc-600'}
                  `}>
                    {status === 'selected' && (
                      <svg className="w-3 h-3 text-black" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" />
                      </svg>
                    )}
                  </div>
                  
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                      <span className="font-medium text-sm text-zinc-200">{model.name}</span>
                      {model.isFree && (
                        <span className="px-1.5 py-0.5 text-[10px] font-medium bg-green-500/20 text-green-400 rounded">FREE</span>
                      )}
                    </div>
                    <p className="text-xs text-zinc-500 truncate">{model.description}</p>
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      );
    }
    
    // Character Slider Component
    function CharacterSlider({ currentCharacters, maxCharacters, onChange, tokens, autoPurchase, onAutoPurchaseChange, disabled = false }) {
      const { baseCharacters, extensionSize, tokensPerExtension } = DEFAULT_CHARACTER_EXTENSION;
      const extensionsUsed = Math.max(0, Math.ceil((maxCharacters - baseCharacters) / extensionSize));
      const tokensNeeded = extensionsUsed * tokensPerExtension;
      const canAfford = tokens >= tokensNeeded;
      const maxSlider = DEFAULT_CHARACTER_EXTENSION.maxExtensions;
      const sliderValue = extensionsUsed;
      
      const handleSliderChange = (value) => {
        const newMax = baseCharacters + (value * extensionSize);
        onChange(Math.min(currentCharacters, newMax));
      };
      
      return (
        <div className="space-y-4">
          <div className="flex items-center justify-between">
            <label className="text-sm font-medium text-zinc-300">Character Limit</label>
            <div className="flex items-center gap-2">
              <span className="text-2xl font-bold text-zinc-100">{maxCharacters}</span>
              <span className="text-xs text-zinc-500">chars</span>
            </div>
          </div>
          
          <div className="space-y-1">
            <div className="flex items-center justify-between text-xs">
              <span className="text-zinc-400">Using {currentCharacters} / {maxCharacters}</span>
              <span className={currentCharacters > maxCharacters ? 'text-red-400' : 'text-zinc-500'}>
                {currentCharacters > maxCharacters ? 'Over limit!' : `${maxCharacters - currentCharacters} remaining`}
              </span>
            </div>
            <div className="h-2 bg-zinc-800 rounded-full overflow-hidden">
              <div
                className={`
                  h-full transition-all duration-300 rounded-full
                  ${currentCharacters > maxCharacters ? 'bg-red-500' : currentCharacters > baseCharacters ? 'bg-amber-500' : 'bg-green-500'}
                `}
                style={{ width: `${Math.min(100, (currentCharacters / maxCharacters) * 100)}%` }}
              />
            </div>
          </div>
          
          <div className="space-y-2">
            <div className="flex items-center justify-between text-xs text-zinc-400">
              <span>Base ({baseCharacters})</span>
              <span>+{maxSlider} Extensions</span>
            </div>
            <input
              type="range"
              min={0}
              max={maxSlider}
              value={sliderValue}
              onChange={(e) => handleSliderChange(parseInt(e.target.value))}
              disabled={disabled}
              className="w-full h-2 bg-zinc-800 rounded-lg appearance-none cursor-pointer disabled:cursor-not-allowed disabled:opacity-50"
              style={{
                WebkitAppearance: 'none',
              }}
            />
          </div>
          
          {extensionsUsed > 0 && (
            <div className="p-3 bg-zinc-800/50 rounded-lg border border-zinc-700">
              <div className="flex items-center gap-2 mb-2">
                <svg className="w-4 h-4 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v12m-3-2.818.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                </svg>
                <span className="text-sm font-medium text-zinc-300">Token Cost</span>
              </div>
              <div className="space-y-1 text-sm">
                <div className="flex justify-between">
                  <span className="text-zinc-400">Base ({baseCharacters} chars)</span>
                  <span className="text-green-400">Free</span>
                </div>
                {extensionsUsed > 0 && (
                  <div className="flex justify-between">
                    <span className="text-zinc-400">+{extensionsUsed} extensions</span>
                    <span className="text-amber-400">{tokensNeeded} tokens</span>
                  </div>
                )}
                <div className="flex justify-between pt-1 border-t border-zinc-700">
                  <span className="text-zinc-300">Total cost</span>
                  <span className={`font-medium ${canAfford ? 'text-green-400' : 'text-red-400'}`}>
                    {tokensNeeded} tokens
                  </span>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }
    
    // ==================== PAGES ====================
    
    // Story Feed Page
    function StoryFeed() {
      const [stories, setStories] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [sortBy, setSortBy] = useState('newest');
      const [filterBy, setFilterBy] = useState('all');
      const [searchQuery, setSearchQuery] = useState('');
      const [modelFilter, setModelFilter] = useState('all');
      
      useEffect(() => {
        fetchStories();
      }, [sortBy, filterBy, modelFilter]);
      
      useEffect(() => {
        const timeout = setTimeout(() => {
          if (searchQuery) fetchStories(true);
        }, 300);
        return () => clearTimeout(timeout);
      }, [searchQuery]);
      
      const fetchStories = async (reset = false) => {
        try {
          setLoading(true);
          const params = new URLSearchParams({
            sort: sortBy,
            filter: filterBy,
            page: '1',
            limit: '24',
          });
          
          if (searchQuery) params.set('q', searchQuery);
          if (modelFilter !== 'all') params.set('model', modelFilter);
          
          const response = await fetch(`/api/stories?${params.toString()}`);
          if (!response.ok) throw new Error('Failed to fetch stories');
          
          const data = await response.json();
          setStories(data.stories);
          setError(null);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };
      
      const truncateContent = (content, maxLength = 150) => {
        if (content.length <= maxLength) return content;
        return content.substring(0, maxLength).trim() + '...';
      };
      
      if (loading && stories.length === 0) {
        return (
          <div className="min-h-screen bg-zinc-950 flex items-center justify-center">
            <div className="animate-spin rounded-full h-12 w-12 border-2 border-amber-500 border-t-transparent"></div>
          </div>
        );
      }
      
      return (
        <div className="min-h-screen bg-zinc-950 py-8 px-4">
          <div className="max-w-6xl mx-auto space-y-6">
            {/* Header */}
            <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="p-3 bg-amber-500/10 rounded-xl">
                  <svg className="w-6 h-6 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                  </svg>
                </div>
                <div>
                  <h1 className="text-2xl font-bold text-zinc-100">Discover Stories</h1>
                  <p className="text-zinc-500">Explore collaborative tales from the community</p>
                </div>
              </div>
              <a href="#create" className="flex items-center justify-center gap-2 px-4 py-2 bg-amber-500 hover:bg-amber-400 text-black font-medium rounded-lg transition-colors">
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
                </svg>
                Create Story
              </a>
            </div>
            
            {/* Filters */}
            <div className="bg-zinc-900 rounded-xl border border-zinc-800 p-4 space-y-4">
              <div className="relative">
                <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-zinc-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input
                  type="text"
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  placeholder="Search stories..."
                  className="w-full pl-10 pr-4 py-2 bg-zinc-950 border border-zinc-800 rounded-lg text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-amber-500/50"
                />
              </div>
              
              <div className="flex flex-wrap gap-3">
                <div className="flex gap-1">
                  {[
                    { value: 'newest', label: 'Newest' },
                    { value: 'trending', label: 'Trending' },
                    { value: 'most-liked', label: 'Most Liked' },
                  ].map(({ value, label }) => (
                    <button
                      key={value}
                      onClick={() => setSortBy(value)}
                      className={`
                        px-3 py-1.5 rounded-lg text-sm transition-colors
                        ${sortBy === value ? 'bg-amber-500/20 text-amber-400' : 'bg-zinc-800 text-zinc-400 hover:bg-zinc-700'}
                      `}
                    >
                      {label}
                    </button>
                  ))}
                </div>
                
                <select
                  value={filterBy}
                  onChange={(e) => setFilterBy(e.target.value)}
                  className="px-3 py-1.5 bg-zinc-800 border border-zinc-700 rounded-lg text-sm text-zinc-300 focus:outline-none"
                >
                  <option value="all">All Stories</option>
                  <option value="completed">Completed</option>
                  <option value="ongoing">Ongoing</option>
                  <option value="my-stories">My Stories</option>
                </select>
                
                <select
                  value={modelFilter}
                  onChange={(e) => setModelFilter(e.target.value)}
                  className="px-3 py-1.5 bg-zinc-800 border border-zinc-700 rounded-lg text-sm text-zinc-300 focus:outline-none"
                >
                  <option value="all">All Models</option>
                  {LLM_MODELS.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                </select>
              </div>
            </div>
            
            {/* Error */}
            {error && (
              <div className="p-4 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400 text-center">
                {error}
              </div>
            )}
            
            {/* Stories Grid */}
            {stories.length === 0 ? (
              <div className="text-center py-16">
                <svg className="w-16 h-16 text-zinc-700 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
                <h3 className="text-xl font-medium text-zinc-400">No stories found</h3>
                <p className="text-zinc-500 mt-2">Try adjusting your filters or create a new story</p>
              </div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                {stories.map((story) => (
                  <a
                    key={story.id}
                    href={`#story/${story.id}`}
                    className="group bg-zinc-900 rounded-xl border border-zinc-800 p-5 hover:border-amber-500/30 transition-all"
                  >
                    <div className="flex items-start justify-between mb-3">
                      <span className={`px-2 py-0.5 text-[10px] font-medium rounded ${getModelColor(story.modelUsed)}`}>
                        {story.modelUsed}
                      </span>
                      <span className="text-xs text-zinc-500">{formatDate(story.createdAt)}</span>
                    </div>
                    
                    <h3 className="text-lg font-semibold text-zinc-100 mb-2 group-hover:text-amber-400 transition-colors line-clamp-2">
                      {story.title}
                    </h3>
                    
                    <p className="text-sm text-zinc-500 mb-4 line-clamp-3">
                      {truncateContent(story.content)}
                    </p>
                    
                    <div className="flex items-center justify-between pt-3 border-t border-zinc-800">
                      <div className="flex items-center gap-3 text-xs text-zinc-500">
                        <span>{story.authorName}</span>
                        <span>{story.contributionCount} contributions</span>
                        <span>{story.likeCount} likes</span>
                      </div>
                    </div>
                  </a>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }
    
    // Create Story Page (simplified for embedded version)
    function CreateStory() {
      const [title, setTitle] = useState('');
      const [content, setContent] = useState('');
      const [selectedModel, setSelectedModel] = useState('kimi-k2.5');
      const [maxCharacters, setMaxCharacters] = useState(300);
      const [tokens, setTokens] = useState(100);
      const [autoPurchase, setAutoPurchase] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [error, setError] = useState(null);
      const [created, setCreated] = useState(false);
      
      useEffect(() => {
        loadUserData();
      }, []);
      
      const loadUserData = async () => {
        try {
          const response = await fetchWithAuth('/api/user/profile');
          const data = await response.json();
          if (data.user) {
            setTokens(data.user.tokens || 0);
            setSelectedModel(data.user.preferredModel || 'kimi-k2.5');
          }
        } catch (error) {
          console.error('Failed to load user data:', error);
        }
      };
      
      const calculateTokensNeeded = () => {
        const { baseCharacters, extensionSize, tokensPerExtension } = DEFAULT_CHARACTER_EXTENSION;
        if (maxCharacters <= baseCharacters) return 0;
        const extensions = Math.ceil((maxCharacters - baseCharacters) / extensionSize);
        return extensions * tokensPerExtension;
      };
      
      const handleSubmit = async () => {
        // Check if user has token set
        if (!getToken()) {
          setError('Please set your API token in Settings first. Go to Settings tab and add your ZO_CLIENT_IDENTITY_TOKEN.');
          return;
        }
        
        const tokensNeeded = calculateTokensNeeded();
        if (tokensNeeded > tokens && !autoPurchase) {
          setError(`Insufficient tokens. Need ${tokensNeeded}, have ${tokens}.`);
          return;
        }
        
        setIsSubmitting(true);
        setError(null);
        
        try {
          const response = await fetchWithAuth('/api/stories', {
            method: 'POST',
            body: JSON.stringify({
              title: title.trim(),
              content: content.trim(),
              modelUsed: selectedModel,
              characterCount: content.length,
              tokensSpent: tokensNeeded,
              maxCharacters,
            }),
          });
          
          if (!response.ok) {
            const errorData = await response.json();
            // API returns { error: { code, message, ... } }
            const errorMessage = errorData.error?.message || errorData.message || 'Failed to create story';
            throw new Error(errorMessage);
          }
          
          setCreated(true);
        } catch (err) {
          setError(err.message);
        } finally {
          setIsSubmitting(false);
        }
      };
      
      if (created) {
        return (
          <div className="min-h-screen bg-zinc-950 py-8 px-4">
            <div className="max-w-2xl mx-auto text-center">
              <div className="w-16 h-16 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg className="w-8 h-8 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
                </svg>
              </div>
              <h2 className="text-2xl font-bold text-zinc-100 mb-2">Story Created!</h2>
              <p className="text-zinc-500 mb-6">Your story has been published successfully.</p>
              <div className="flex gap-3 justify-center">
                <a href="#create" onClick={() => { setCreated(false); setTitle(''); setContent(''); }} className="px-6 py-2 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 rounded-lg transition-colors">
                  Create Another
                </a>
                <a href="#feed" className="px-6 py-2 bg-amber-500 hover:bg-amber-400 text-black font-medium rounded-lg transition-colors">
                  View Feed
                </a>
              </div>
            </div>
          </div>
        );
      }
      
      return (
        <div className="min-h-screen bg-zinc-950 py-8 px-4">
          <div className="max-w-2xl mx-auto space-y-6">
            <div className="flex items-center gap-3">
              <div className="p-3 bg-amber-500/10 rounded-xl">
                <svg className="w-6 h-6 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                </svg>
              </div>
              <div>
                <h1 className="text-2xl font-bold text-zinc-100">Create Story</h1>
                <p className="text-zinc-500">Share your tale with the community</p>
              </div>
              <div className="ml-auto flex items-center gap-2 px-4 py-2 bg-zinc-900 rounded-lg border border-zinc-800">
                <svg className="w-4 h-4 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v12m-3-2.818.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                </svg>
                <span className="font-medium text-zinc-300">{tokens}</span>
              </div>
            </div>
            
            {error && (
              <div className="flex items-center gap-2 p-4 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400">
                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                {error}
              </div>
            )}
            
            <div className="space-y-4">
              <div>
                <label className="text-sm font-medium text-zinc-300 mb-2 block">Story Title</label>
                <input
                  type="text"
                  value={title}
                  onChange={(e) => setTitle(e.target.value)}
                  placeholder="Enter a captivating title..."
                  maxLength={100}
                  className="w-full px-4 py-3 bg-zinc-900 border border-zinc-800 rounded-xl text-lg text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-amber-500/50"
                />
              </div>
              
              <div>
                <label className="text-sm font-medium text-zinc-300 mb-2 block">Your Story</label>
                <textarea
                  value={content}
                  onChange={(e) => setContent(e.target.value)}
                  placeholder="Once upon a time..."
                  rows={8}
                  className="w-full px-4 py-3 bg-zinc-900 border border-zinc-800 rounded-xl text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-amber-500/50 resize-none"
                />
              </div>
              
              <div className="bg-zinc-900 rounded-xl border border-zinc-800 p-6 space-y-6">
                <ModelSelector
                  selectedModel={selectedModel}
                  onModelChange={setSelectedModel}
                  disabled={isSubmitting}
                />
                
                <CharacterSlider
                  currentCharacters={content.length}
                  maxCharacters={maxCharacters}
                  onChange={setMaxCharacters}
                  tokens={tokens}
                  autoPurchase={autoPurchase}
                  onAutoPurchaseChange={setAutoPurchase}
                  disabled={isSubmitting}
                />
              </div>
              
              <button
                onClick={handleSubmit}
                disabled={isSubmitting || !title.trim() || !content.trim()}
                className={`
                  w-full flex items-center justify-center gap-2 py-4 px-6 font-medium rounded-xl transition-all
                  ${title.trim() && content.trim()
                    ? 'bg-amber-500 hover:bg-amber-400 text-black'
                    : 'bg-zinc-800 text-zinc-500 cursor-not-allowed'
                  }
                `}
              >
                {isSubmitting ? (
                  <>
                    <div className="w-5 h-5 border-2 border-black/30 border-t-black rounded-full animate-spin" />
                    Publishing...
                  </>
                ) : (
                  <>
                    <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                    {calculateTokensNeeded() > 0 ? `Publish (${calculateTokensNeeded()} tokens)` : 'Publish Free'}
                  </>
                )}
              </button>
            </div>
          </div>
        </div>
      );
    }
    
    // Settings Page with token configuration
    function Settings() {
      const [tokenInput, setTokenInput] = useState('');
      const [hasToken, setHasToken] = useState(false);
      const [saved, setSaved] = useState(false);
      
      useEffect(() => {
        const token = getToken();
        if (token) {
          setTokenInput(token);
          setHasToken(true);
        }
      }, []);
      
      const handleSaveToken = () => {
        if (tokenInput.trim()) {
          setToken(tokenInput.trim());
          setHasToken(true);
          setSaved(true);
          setTimeout(() => setSaved(false), 3000);
        }
      };
      
      const handleClearToken = () => {
        localStorage.removeItem(TOKEN_KEY);
        setTokenInput('');
        setHasToken(false);
      };
      
      return (
        <div className="min-h-screen bg-zinc-950 py-8 px-4">
          <div className="max-w-2xl mx-auto space-y-6">
            <div className="flex items-center gap-3">
              <div className="p-3 bg-amber-500/10 rounded-xl">
                <svg className="w-6 h-6 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c-.94 1.543-.826 3.31 2.37 2.37a1.724 1.724 0 002.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
              </div>
              <div>
                <h1 className="text-2xl font-bold text-zinc-100">Settings</h1>
                <p className="text-zinc-500">Configure your StoryChain experience</p>
              </div>
            </div>
            
            {/* Auth Token Section */}
            <div className="bg-zinc-900 rounded-xl border border-zinc-800 p-6 space-y-4">
              <div className="flex items-center gap-2 mb-2">
                <svg className="w-5 h-5 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                </svg>
                <h2 className="text-lg font-semibold text-zinc-200">API Token</h2>
              </div>
              
              <p className="text-sm text-zinc-400">
                Your token is required to create stories and access your account. 
                {hasToken ? (
                  <span className="text-green-400 ml-1">Token configured.</span>
                ) : (
                  <span className="text-amber-400 ml-1">No token set - you will be in guest mode.</span>
                )}
              </p>
              
              <div className="space-y-3">
                <input
                  type="password"
                  value={tokenInput}
                  onChange={(e) => setTokenInput(e.target.value)}
                  placeholder="Paste your ZO_CLIENT_IDENTITY_TOKEN here..."
                  className="w-full px-4 py-3 bg-zinc-950 border border-zinc-700 rounded-lg text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-amber-500/50 font-mono text-sm"
                />
                
                <div className="flex gap-3">
                  <button
                    onClick={handleSaveToken}
                    disabled={!tokenInput.trim()}
                    className={`
                      flex-1 py-2 px-4 rounded-lg font-medium transition-all
                      ${tokenInput.trim() 
                        ? 'bg-amber-500 hover:bg-amber-400 text-black' 
                        : 'bg-zinc-800 text-zinc-500 cursor-not-allowed'}
                    `}
                  >
                    {saved ? 'Saved!' : 'Save Token'}
                  </button>
                  
                  {hasToken && (
                    <button
                      onClick={handleClearToken}
                      className="py-2 px-4 bg-zinc-800 hover:bg-zinc-700 text-zinc-400 rounded-lg transition-colors"
                    >
                      Clear
                    </button>
                  )}
                </div>
              </div>
              
              <p className="text-xs text-zinc-500">
                Find your token at{' '}
                <a href="https://kofi.zo.computer/?t=settings&s=advanced" target="_blank" className="text-amber-500 hover:underline">
                  Settings > Advanced
                </a>{' '}
                in your Zo Computer.
              </p>
            </div>
            
            {/* API Keys Info */}
            <div className="bg-zinc-900 rounded-xl border border-zinc-800 p-6">
              <h2 className="text-lg font-semibold text-zinc-200 mb-4">Additional API Keys (Optional)</h2>
              <p className="text-sm text-zinc-500 mb-4">
                Add these keys to your Zo Computer to unlock more AI models:
              </p>
              <ul className="space-y-2 text-sm text-zinc-400">
                <li className="flex items-center gap-2">
                  <span className="w-2 h-2 bg-green-500 rounded-full"></span>
                  ZO_CLIENT_IDENTITY_TOKEN (required for auth)
                </li>
                <li className="flex items-center gap-2">
                  <span className="w-2 h-2 bg-blue-500 rounded-full"></span>
                  OPENROUTER_API_KEY (Reka Edge, Qwen 2.5)
                </li>
                <li className="flex items-center gap-2">
                  <span className="w-2 h-2 bg-purple-500 rounded-full"></span>
                  GROQ_API_KEY (free Llama 3.1, Gemma 2, Mixtral)
                </li>
                <li className="flex items-center gap-2">
                  <span className="w-2 h-2 bg-amber-500 rounded-full"></span>
                  INCEPTION_API_KEY (Mercury 2)
                </li>
                <li className="flex items-center gap-2">
                  <span className="w-2 h-2 bg-indigo-500 rounded-full"></span>
                  GOOGLE_API_KEY (Gemini Pro)
                </li>
              </ul>
            </div>
          </div>
        </div>
      );
    }
    
    // Navigation
    function Navigation({ currentRoute }) {
      const navItems = [
        { path: 'feed', label: 'Discover', icon: 'M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25' },
        { path: 'create', label: 'Create', icon: 'M12 4.5v15m7.5-7.5h-15' },
        { path: 'tokens', label: 'Tokens', icon: 'M12 6v12m-3-2.818.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z' },
        { path: 'settings', label: 'Settings', icon: 'M9.594 3.94c.09-.542.556-.94 1.11-.94h2.593c.554 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.004-.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.325.183-.581.495-.644.869l-.214-1.28c-.09.543-.555.941-1.11.941h-2.594c-.555 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z M15 12a3 3 0 11-6 0 3 3 0 016 0z' },
      ];
      
      const isActive = (path) => {
        if (path === 'feed' && (currentRoute === '' || currentRoute === 'feed')) return true;
        return currentRoute === path;
      };
      
      return (
        <nav className="fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-800 z-50">
          <div className="max-w-6xl mx-auto px-4">
            <div className="flex items-center justify-around py-2">
              {navItems.map(({ path, label, icon }) => (
                <a
                  key={path}
                  href={`#${path}`}
                  className={`
                    flex items-center justify-center gap-2 px-4 py-2 rounded-lg transition-colors
                    ${isActive(path) ? 'text-amber-400' : 'text-zinc-400'}
                  `}
                >
                  <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d={icon} />
                  </svg>
                  <span className="text-xs font-medium">{label}</span>
                </a>
              ))}
            </div>
          </div>
        </nav>
      );
    }
    
    // Main App
    function App() {
      const [route, setRoute] = useState('feed');
      
      useEffect(() => {
        const handleHashChange = () => {
          const hash = window.location.hash.slice(1);
          setRoute(hash.split('/')[0] || 'feed');
        };
        
        handleHashChange();
        window.addEventListener('hashchange', handleHashChange);
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, []);
      
      const renderPage = () => {
        switch (route) {
          case 'feed':
          case '':
            return <StoryFeed />;
          case 'create':
            return <CreateStory />;
          case 'settings':
            return <Settings />;
          case 'tokens':
            return (
              <div className="min-h-screen bg-zinc-950 py-8 px-4 flex items-center justify-center">
                <div className="text-center">
                  <h2 className="text-2xl font-bold text-zinc-100 mb-4">Token Store</h2>
                  <p className="text-zinc-500 mb-6">Coming soon! Check back for token purchasing options.</p>
                  <a href="#feed" className="px-6 py-2 bg-amber-500 hover:bg-amber-400 text-black font-medium rounded-lg">
                    Back to Feed
                  </a>
                </div>
              </div>
            );
          default:
            return <StoryFeed />;
        }
      };
      
      return (
        <div className="min-h-screen bg-zinc-950 pb-20">
          <Navigation currentRoute={route} />
          <main>{renderPage()}</main>
        </div>
      );
    }
    
    // Mount
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
