<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18181b"/>
      <stop offset="50%" style="stop-color:#581c87"/>
      <stop offset="100%" style="stop-color:#18181b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Logo icon -->
  <g transform="translate(550, 120)">
    <path d="M50 0 L100 50 L50 100 L0 50 Z" fill="url(#accent)" opacity="0.9"/>
    <path d="M50 15 L85 50 L50 85 L15 50 Z" fill="#18181b"/>
    <circle cx="50" cy="50" r="15" fill="url(#accent)"/>
    <path d="M50 35 L50 65 M35 50 L65 50" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="300" font-family="system-ui, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle">WealthWeaver AI</text>
  
  <!-- Subtitle -->
  <text x="600" y="370" font-family="system-ui, sans-serif" font-size="28" fill="#a1a1aa" text-anchor="middle">Autonomous Development Systems</text>
  
  <!-- Tagline -->
  <text x="600" y="420" font-family="monospace" font-size="22" fill="#a855f7" text-anchor="middle">Building wealth through intelligent automation</text>
  
  <!-- Stats bar -->
  <g transform="translate(200, 480)">
    <rect width="800" height="80" rx="10" fill="#27272a" opacity="0.5"/>
    
    <text x="100" y="50" font-family="system-ui, sans-serif" font-size="32" font-weight="bold" fill="#a855f7" text-anchor="middle">24/7</text>
    <text x="100" y="70" font-family="system-ui, sans-serif" font-size="14" fill="#71717a" text-anchor="middle">ACTIVE</text>
    
    <line x1="200" y1="20" x2="200" y2="60" stroke="#3f3f46" stroke-width="1"/>
    
    <text x="300" y="50" font-family="system-ui, sans-serif" font-size="32" font-weight="bold" fill="#22c55e" text-anchor="middle">R199k</text>
    <text x="300" y="70" font-family="system-ui, sans-serif" font-size="14" fill="#71717a" text-anchor="middle">PIPELINE</text>
    
    <line x1="400" y1="20" x2="400" y2="60" stroke="#3f3f46" stroke-width="1"/>
    
    <text x="500" y="50" font-family="system-ui, sans-serif" font-size="32" font-weight="bold" fill="#3b82f6" text-anchor="middle">2</text>
    <text x="500" y="70" font-family="system-ui, sans-serif" font-size="14" fill="#71717a" text-anchor="middle">PRODUCTS</text>
    
    <line x1="600" y1="20" x2="600" y2="60" stroke="#3f3f46" stroke-width="1"/>
    
    <text x="700" y="50" font-family="system-ui, sans-serif" font-size="32" font-weight="bold" fill="#facc15" text-anchor="middle">R2,500</text>
    <text x="700" y="70" font-family="system-ui, sans-serif" font-size="14" fill="#71717a" text-anchor="middle">STARTING FROM</text>
  </g>
  
  <!-- URL -->
  <text x="600" y="600" font-family="monospace" font-size="16" fill="#52525b" text-anchor="middle">kofi.zo.space</text>
</svg>
